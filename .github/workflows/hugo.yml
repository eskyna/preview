# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deployment

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deploy mode override: environment | live | preview"
        required: false
        default: environment
        type: choice
        options:
          - environment
          - live
          - preview

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Format check job (parallel)
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install Node.js dependencies
        run: npm install
      - name: Check code formatting (Prettier)
        run: npm run format:check

  # Lint job (parallel)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install Node.js dependencies
        run: npm install
      - name: Run linters (CSS & Markdown)
        run: npm run lint

  # Translation/template consistency check (parallel)
  check-translation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.160.0"
          extended: true
      - name: Run translation check
        run: ./bin/check_translation

  # Build job (depends on format-check and lint)
  build:
    needs: [format-check, lint, check-translation]
    runs-on: ubuntu-latest
    environment: gh_pages
    steps:
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.160.0"
          extended: true
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Prepare preview banner metadata
        run: |
          BASE_URL="${{ steps.pages.outputs.base_url }}"
          MODE_INPUT="${{ github.event.inputs.deploy_mode || '' }}"
          MODE_VAR="${{ vars.DEPLOY_MODE || '' }}"
          LAST_UPDATED="$(git log -1 --date=format:'%Y-%m-%d %H:%M UTC' --pretty=format:'%cd')"
          VERSION="$(git rev-parse --short HEAD)"
          COMMITS="$(git log -n 5 --pretty=format:'%s' | sed 's/|/-/g' | awk 'NR==1{printf "%s", $0} NR>1{printf " || %s", $0}')"

          if [[ -z "$MODE_VAR" ]]; then
            echo "Fehler: Environment-Variable DEPLOY_MODE ist nicht gesetzt (expected: live oder preview)." >&2
            exit 1
          fi

          if [[ "$MODE_VAR" != "live" && "$MODE_VAR" != "preview" ]]; then
            echo "Fehler: Ungueltiger DEPLOY_MODE='$MODE_VAR' (erlaubt: live, preview)." >&2
            exit 1
          fi

          MODE=""
          if [[ -n "$MODE_INPUT" && "$MODE_INPUT" != "environment" ]]; then
            MODE="$MODE_INPUT"
          else
            MODE="$MODE_VAR"
          fi

          if [[ "$MODE" != "live" && "$MODE" != "preview" ]]; then
            echo "Fehler: Effektiver deploy_mode '$MODE' ist ungueltig (erlaubt: live, preview)." >&2
            exit 1
          fi

          BUILD_BASEURL="${BASE_URL%/}/"

          if [[ "$MODE" == "preview" ]]; then
            echo "HUGO_PREVIEW_BANNER=true" >> "$GITHUB_ENV"
            if [[ "$BASE_URL" == *"/preview" ]]; then
              BUILD_BASEURL="${BASE_URL%/}/"
            else
              BUILD_BASEURL="${BASE_URL%/}/preview/"
            fi
          else
            echo "HUGO_PREVIEW_BANNER=false" >> "$GITHUB_ENV"
            BUILD_BASEURL="${BASE_URL%/}/"
            MODE="live"
          fi

          echo "HUGO_PREVIEW_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "HUGO_PREVIEW_LAST_UPDATED=$LAST_UPDATED" >> "$GITHUB_ENV"
          echo "HUGO_PREVIEW_COMMITS=$COMMITS" >> "$GITHUB_ENV"
          echo "HUGO_BUILD_BASEURL=$BUILD_BASEURL" >> "$GITHUB_ENV"
          echo "DEPLOY_MODE_EFFECTIVE=$MODE" >> "$GITHUB_ENV"

          echo "Resolved deploy mode: $MODE"
          echo "Resolved base URL: $BUILD_BASEURL"
          echo "Preview banner: $(grep -E '^HUGO_PREVIEW_BANNER=' "$GITHUB_ENV" | tail -1 | cut -d= -f2-)"
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install Node.js dependencies
        run: npm install
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          HUGO_BASEURL: ${{ env.HUGO_BUILD_BASEURL }}
          HUGO_PREVIEW_BANNER: ${{ env.HUGO_PREVIEW_BANNER }}
          HUGO_PREVIEW_VERSION: ${{ env.HUGO_PREVIEW_VERSION }}
          HUGO_PREVIEW_LAST_UPDATED: ${{ env.HUGO_PREVIEW_LAST_UPDATED }}
          HUGO_PREVIEW_COMMITS: ${{ env.HUGO_PREVIEW_COMMITS }}
        run: npm run build:ci
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  # Link check job (depends on build)
  link-check:
    needs: build
    runs-on: ubuntu-latest
    environment: gh_pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages
          path: ./artifact
      - name: Extract artifact
        run: |
          cd ./artifact
          tar -xf artifact.tar
          cd ..
          mv ./artifact ./public
      - name: Verify links, assets and anchors
        run: |
          BASE_URL="${{ steps.pages.outputs.base_url }}"
          MODE_INPUT="${{ github.event.inputs.deploy_mode || '' }}"
          MODE_VAR="${{ vars.DEPLOY_MODE || '' }}"

          MODE=""
          if [[ -n "$MODE_INPUT" && "$MODE_INPUT" != "environment" ]]; then
            MODE="$MODE_INPUT"
          else
            MODE="$MODE_VAR"
          fi
          if [[ -z "$MODE" ]]; then
            MODE="live"
          fi

          CHECK_BASE_URL="${BASE_URL%/}/"
          if [[ "$MODE" == "preview" ]]; then
            if [[ "$BASE_URL" == *"/preview" ]]; then
              CHECK_BASE_URL="${BASE_URL%/}/"
            else
              CHECK_BASE_URL="${BASE_URL%/}/preview/"
            fi
          else
            CHECK_BASE_URL="${BASE_URL%/}/"
          fi

          export CHECK_BASE_URL

          BASE_PATH=$(python3 - <<'PY'
          from urllib.parse import urlparse
          import os

          parsed = urlparse(os.environ["CHECK_BASE_URL"])
          path = parsed.path.rstrip("/")
          print(path)
          PY
          )

          SERVE_DIR=$(mktemp -d)
          if [ -n "$BASE_PATH" ]; then
            mkdir -p "$SERVE_DIR$BASE_PATH"
            cp -R public/. "$SERVE_DIR$BASE_PATH/"
          else
            cp -R public/. "$SERVE_DIR/"
          fi

          python3 -m http.server 4173 --directory "$SERVE_DIR" >/tmp/linkcheck-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID; rm -rf "$SERVE_DIR"' EXIT

          LINKS_CHECKED=$(python3 bin/check-live-assets \
            "http://localhost:4173${BASE_PATH}" \
            "http://localhost:4173${BASE_PATH}/estyle" \
            "http://localhost:4173${BASE_PATH}/about" \
            "http://localhost:4173${BASE_PATH}/impressum" \
            "http://localhost:4173${BASE_PATH}/datenschutz" \
            "http://localhost:4173${BASE_PATH}/shop" \
            "http://localhost:4173${BASE_PATH}/blog" \
            --max-pages 300 \
            --concurrency 12 2>&1 | grep -oP '(?<=checked: )\d+' | tail -1 || echo "0")
          echo "Links checked in build: $LINKS_CHECKED"
        env:
          CHECK_BASE_URL: ${{ steps.pages.outputs.base_url }}

  # Deployment job (depends on build and link-check)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, link-check]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
