# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deployment

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Format check job (parallel)
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install Node.js dependencies
        run: npm install
      - name: Check code formatting (Prettier)
        run: npm run format:check

  # Lint job (parallel)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install Node.js dependencies
        run: npm install
      - name: Run linters (CSS & Markdown)
        run: npm run lint

  # Build job (depends on format-check and lint)
  build:
    needs: [format-check, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.160.0"
          extended: true
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install Node.js dependencies
        run: npm install
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          HUGO_BASEURL: ${{ steps.pages.outputs.base_url }}/
        run: npm run build:ci
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  # Link check job (depends on build)
  link-check:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages
          path: ./artifact
      - name: Extract artifact
        run: |
          cd ./artifact
          tar -xf artifact.tar
          cd ..
          mv ./artifact ./public
      - name: Verify links, assets and anchors
        run: |
          BASE_PATH=$(python3 - <<'PY'
          from urllib.parse import urlparse
          import os

          parsed = urlparse(os.environ["PAGES_BASE_URL"])
          path = parsed.path.rstrip("/")
          print(path)
          PY
          )

          SERVE_DIR=$(mktemp -d)
          if [ -n "$BASE_PATH" ]; then
            mkdir -p "$SERVE_DIR$BASE_PATH"
            cp -R public/. "$SERVE_DIR$BASE_PATH/"
          else
            cp -R public/. "$SERVE_DIR/"
          fi

          python3 -m http.server 4173 --directory "$SERVE_DIR" >/tmp/linkcheck-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID; rm -rf "$SERVE_DIR"' EXIT

          python3 bin/check-live-assets \
            "http://localhost:4173${BASE_PATH}" \
            "http://localhost:4173${BASE_PATH}/estyle" \
            "http://localhost:4173${BASE_PATH}/about" \
            "http://localhost:4173${BASE_PATH}/impressum" \
            "http://localhost:4173${BASE_PATH}/datenschutz" \
            "http://localhost:4173${BASE_PATH}/shop" \
            "http://localhost:4173${BASE_PATH}/blog" \
            --max-pages 300 \
            --concurrency 12
        env:
          PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}

  # Deployment job (depends on build and link-check)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, link-check]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
