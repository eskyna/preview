baseURL = "https://eskyna.com/preview/"
defaultContentLanguage = "de"
defaultContentLanguageInSubdir = false
disableHugoGeneratorInject = true
cleanDestinationDir = true
[minify]
  minifyOutput = true
title = "ESKYNA | Style & Image Coaching"

[languages]
  [languages.de]
    title = "ESKYNA | Style & Image Coaching"
    locale = "de-DE"
    languageName = "Deutsch"
    weight = 1
    contentDir = "content/de"
    [languages.de.params]
      author = "Natalia Kleemann"
      description = "Persönliches Style- und Image-Coaching Vor-Ort und Online. Entdecken Sie Ihren individuellen Stil, treten Sie sichtbar und authentisch auf. ESKYNA begleitet Sie zu mehr Stilsicherheit und Selbstvertrauen."
  
  [languages.ru]
    title = "ESKYNA | Имидж-коучинг"
    locale = "ru-RU"
    languageName = "Русский"
    weight = 2
    contentDir = "content/ru"
    [languages.ru.params]
      author = "Natalia Kleemann"
      description = "Персональный имидж- и стиль-коучинг в Ганновере и онлайн. Развивайте свой стиль, уверенность и аутентичность с методом ESKYNA. Трансформируйте образ и становитесь заметным, стильным и уверенным профессионалом."

[params]
  author = "Natalia Kleemann"
  description = "Persönliches Style- und Image-Coaching Vor-Ort und Online. Entdecken Sie Ihren individuellen Stil, treten Sie sichtbar und authentisch auf. ESKYNA begleitet Sie zu mehr Stilsicherheit und Selbstvertrauen."
  keywords = "Styleberatung, Imageberatung, Personal Styling, Farbberatung, Hannover, Online Coaching"
  contact_endpoint = "https://contact-api.eskyna-style.workers.dev"
  contact_fallback_email = "eskyna.app@gmail.com"
  turnstile_site_key = "0x4AAAAAADZwJxWSmKaRT7a5"
  [params.preview_banner]
    enabled = false
    label = "Preview"
    version = ""
    last_updated = ""
    commits = ""
    links_checked = ""

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
