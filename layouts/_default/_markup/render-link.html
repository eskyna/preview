{{- $dest := .Destination -}}
{{- $isExternal := or (hasPrefix $dest "http://") (hasPrefix $dest "https://") -}}
{{- $forceNewTab := or (hasPrefix $dest "/stiltest") (hasPrefix $dest "/garderobencheck") -}}
{{- $title := .Title | default (plainify .Text) -}}

<a href="{{ $dest | safeURL }}"
  {{- with $title }} title="{{ . }}"{{ end -}}
  {{- if or $isExternal $forceNewTab }} target="_blank" rel="noopener noreferrer"{{ end -}}
>
  {{- .Text | safeHTML -}}
</a>
