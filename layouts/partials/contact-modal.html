{{ $isRu := eq .Language.Lang "ru" }}
{{ $homeOfferValue := cond $isRu "Общий запрос" "Allgemeine Anfrage" }}
<div class="contact-modal" data-contact-modal hidden>
  <div class="contact-modal-backdrop" data-contact-close></div>
  <div class="contact-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title">
    <button class="contact-modal-close" type="button" aria-label="{{ cond $isRu "Закрыть форму" "Kontaktformular schließen" }}" data-contact-close>
      <span aria-hidden="true">×</span>
    </button>
    <h2 id="contact-modal-title">{{ cond $isRu "Сообщение для Наталии" "Nachricht an Natalia" }}</h2>
    {{ partial "contact-form.html" (dict "page" . "formId" "home-contact-form" "offer" $homeOfferValue) }}
  </div>
</div>
