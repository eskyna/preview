<div class="language-switcher">{{- $current := .Language.Lang -}}
  {{- if eq $current "de" -}}<span class="language-current" lang="de">de</span><span class="language-divider">|</span><a href="ru/" lang="ru" class="language-link" data-lang="ru" title="Русский">ru</a>
  {{- else -}}<a href="../" lang="de" class="language-link" data-lang="de" title="Deutsch">de</a><span class="language-divider">|</span><span class="language-current" lang="ru">ru</span>
  {{- end -}}
</div>
