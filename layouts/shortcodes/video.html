{{- $src := .Get "src" -}}
{{- $poster := .Get "poster" -}}
{{- $langDefault := cond (eq .Page.Language.Lang "ru") "Ваш браузер не поддерживает видео." "Dein Browser unterstützt kein Video." -}}
{{- $videoFallbackText := or site.Params.ui.video_fallback_text $langDefault -}}
<video controls preload="metadata" playsinline {{ if $poster }}poster="{{ $poster }}"{{ end }} style="width:100%;height:auto;border-radius:12px;margin:0 0 1.25rem 0;">
  <source src="./{{ $src }}" type="video/mp4">
  {{ $videoFallbackText }}
</video>
